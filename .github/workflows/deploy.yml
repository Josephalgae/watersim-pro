name: Deploy to Cloudflare Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Inject API keys
        env:
          GEMINI: ${{ secrets.GEMINI_KEY_B64 }}
          GROQ: ${{ secrets.GROQ_KEY_B64 }}
          OPENROUTER: ${{ secrets.OPENROUTER_KEY_B64 }}
        run: |
          sed -i "s|__GEMINI_KEY_B64__|${GEMINI}|" index.html
          sed -i "s|__GROQ_KEY_B64__|${GROQ}|" index.html
          sed -i "s|__OPENROUTER_KEY_B64__|${OPENROUTER}|" index.html
          echo "✓ Injection done"
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=watersim-pro --branch=main --commit-dirty=true
